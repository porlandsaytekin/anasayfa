const hesaplaOrt = (tuketim, yil) => {
  const vals = AYLAR.map(a=>parseFloat(tuketim[String(yil)]?.[a])).filter(v=>!isNaN(v)&&v>0);
  return vals.length ? vals.reduce((s,v)=>s+v,0)/vals.length : 0;
};
const son12AyOrt = (tuketim) => {
  // 2026 Ocak+Şubat + 2025'in son 10 ayı
  const aylar2026 = ["Ocak","Şubat"].map(a=>parseFloat(tuketim["2026"]?.[a])).filter(v=>!isNaN(v)&&v>0);
  const aylar2025 = AYLAR.slice(aylar2026.length > 0 ? 12-(12-aylar2026.length) : 0).map(a=>parseFloat(tuketim["2025"]?.[a])).filter(v=>!isNaN(v)&&v>0);
  // Basit: 2025 tüm aylar + 2026 ocak-şubat, son 12'yi al
  const tumAylar = [
    ...AYLAR.map(a=>({y:"2025",a,v:parseFloat(tuketim["2025"]?.[a])})),
    ...["Ocak","Şubat"].map(a=>({y:"2026",a,v:parseFloat(tuketim["2026"]?.[a])}))
  ].filter(x=>!isNaN(x.v)&&x.v>0).slice(-12);
  return tumAylar.length ? tumAylar.reduce((s,x)=>s+x.v,0)/tumAylar.length : 0;
};
const son3AyOrt = (tuketim) => {
  const tumAylar = [
    ...AYLAR.map(a=>({v:parseFloat(tuketim["2025"]?.[a])})),
    ...["Ocak","Şubat"].map(a=>({v:parseFloat(tuketim["2026"]?.[a])}))
  ].filter(x=>!isNaN(x.v)&&x.v>0).slice(-3);
  return tumAylar.length ? tumAylar.reduce((s,x)=>s+x.v,0)/tumAylar.length : 0;
};

                display:"flex", alignItems:"center", gap:8, transition:"all 0.2s"
              }}>
                <span style={{width:8,height:8,borderRadius:"50%",background:aktifYil===y?renk.dot:"#374151",display:"inline-block"}}/>
                {y}
                {ort && <span style={{fontSize:11,opacity:0.75}}>ort: {Number(ort).toLocaleString("tr-TR")}</span>}
              </button>
            );
          })}
        </div>

        {/* Ay Girişleri */}
        <div style={{animation:"fadeIn 0.2s"}}>
          <div style={{
            display:"inline-block", padding:"4px 12px", borderRadius:6, marginBottom:14,
            background: YIL_RENKLER[aktifYil].bg,
            border: `1px solid ${YIL_RENKLER[aktifYil].border}33`
          }}>
            <span className="year-header" style={{color:YIL_RENKLER[aktifYil].text}}>
              {aktifYil} Tüketim Verileri
            </span>
          </div>
          <div style={{display:"grid", gridTemplateColumns:"repeat(6,1fr)", gap:10}}>
            {AYLAR.map(ay => (
              <div key={ay}>
                <label style={{display:"block",fontSize:11,color:"#4b5563",marginBottom:4,textAlign:"center",fontWeight:600}}>{ay}</label>
                <input
                  className="month-input"
                  type="number"
                  placeholder="—"
                  value={form.tuketim[aktifYil][ay]}
                  onChange={e=>setTuketim(aktifYil, ay, e.target.value)}
                  style={{borderColor: YIL_RENKLER[aktifYil].border+"44"}}
                />
              </div>
            ))}
          </div>

          {/* Yıl özet satırı */}
          <div style={{marginTop:16, background:"#0f1117", borderRadius:8, padding:"12px 16px", display:"flex", gap:24, flexWrap:"wrap"}}>
            {(() => {
              const vals = AYLAR.map(a=>parseFloat(form.tuketim[aktifYil][a])).filter(v=>!isNaN(v)&&v>0);
              const toplam = vals.reduce((s,v)=>s+v,0);
              const ort = vals.length ? (toplam/vals.length) : 0;
              const maks = vals.length ? Math.max(...vals) : 0;
              const girilenAy = vals.length;
              return (
                <>
                  <div><span style={{fontSize:11,color:"#4b5563"}}>Girilen Ay</span><div style={{fontWeight:700,color:"#f1f5f9"}}>{girilenAy} / 12</div></div>
                  <div><span style={{fontSize:11,color:"#4b5563"}}>Toplam</span><div style={{fontWeight:700,color:YIL_RENKLER[aktifYil].text}}>{toplam.toLocaleString("tr-TR")}</div></div>
                  <div><span style={{fontSize:11,color:"#4b5563"}}>Ortalama</span><div style={{fontWeight:700,color:"#f1f5f9"}}>{ort.toLocaleString("tr-TR",{maximumFractionDigits:0})}</div></div>
                  <div><span style={{fontSize:11,color:"#4b5563"}}>En Yüksek</span><div style={{fontWeight:700,color:"#f1f5f9"}}>{maks.toLocaleString("tr-TR")}</div></div>
                </>
              );
            })()}
          </div>
        </div>
      </div>

      {/* Kaydet / İptal */}
      <div style={{display:"flex", gap:10, marginTop:16, justifyContent:"flex-end"}}>
        <button className="btn-secondary" onClick={onIptal}>İptal</button>
        <button className="btn-primary" onClick={onKaydet}>
          {duzenleMode ? "✏️ Güncelle" : "💾 Kaydet"}
        </button>
      </div>
    </div>
  );
}

function App() {
  const [liste, setListe] = useState(EXCEL_VERISI);
  const [ekran, setEkran] = useState("liste"); // liste | form | detay | ihtiyac
  const [form, setForm] = useState(bos_form());
  const [duzenleId, setDuzenleId] = useState(null);
  const [detayId, setDetayId] = useState(null);
  const [bildirim, setBildirim] = useState(null);
  const [arama, setArama] = useState("");
  const [filtreSK, setFiltreSK] = useState("Tümü");
  const [filtreTur, setFiltreTur] = useState("Tümü");

  const goster = (mesaj, tip="basari") => {
    setBildirim({mesaj,tip});
    setTimeout(()=>setBildirim(null), 3000);
  };

  const yeniForm = () => {
    setDuzenleId(null);
    setForm(bos_form());
    setEkran("form");
  };

  const duzenle = (m) => {
    setDuzenleId(m.id);
    setForm({...m});
    setEkran("form");
  };

  const kaydet = () => {
    if (!form.stokKodu || !form.hammaddeIsmi) {
      goster("Stok Kodu ve Hammadde İsmi zorunludur!","hata");
      return;
    }
    if (duzenleId) {
      setListe(p=>p.map(m=>m.id===duzenleId?{...form,id:duzenleId}:m));
      goster("Hammadde güncellendi.");
    } else {
      setListe(p=>[...p,{...form,id:Date.now()}]);
      goster("Hammadde eklendi.");
    }
    setEkran("liste");
  };

  const sil = (id) => {
    setListe(p=>p.filter(m=>m.id!==id));
    goster("Silindi.","uyari");
  };

  const detay = (m) => { setDetayId(m.id); setEkran("detay"); };

  const filtreliListe = useMemo(()=>liste.filter(m=>{
    const aramaOk = m.hammaddeIsmi.toLowerCase().includes(arama.toLowerCase()) ||
      m.stokKodu.toString().includes(arama) || m.tur.toLowerCase().includes(arama.toLowerCase());
    const skOk = filtreSK==="Tümü" || m.sk===filtreSK;
    const turOk = filtreTur==="Tümü" || m.tur===filtreTur;
    return aramaOk && skOk && turOk;
  }), [liste, arama, filtreSK, filtreTur]);

  const detayM = liste.find(m=>m.id===detayId);

  return (
    <div style={{minHeight:"100vh"}}>
      {/* Bildirim */}
      {bildirim && (
        <div style={{position:"fixed",top:20,right:20,zIndex:9999,
          background:bildirim.tip==="basari"?"#10b981":bildirim.tip==="hata"?"#ef4444":"#f59e0b",
          color:"#fff",padding:"11px 20px",borderRadius:8,fontWeight:700,
          boxShadow:"0 4px 20px rgba(0,0,0,0.5)",animation:"slideIn 0.3s",fontSize:14}}>
          {bildirim.mesaj}
        </div>
      )}

      {/* Header */}
      <div style={{borderBottom:"1px solid #1e2430",padding:"0 28px",display:"flex",alignItems:"center",justifyContent:"space-between",height:60,background:"#0d1017",position:"sticky",top:0,zIndex:100}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{width:34,height:34,background:"linear-gradient(135deg,#3b82f6,#6366f1)",borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>⬡</div>
          <div>
            <div style={{fontSize:15,fontWeight:700,color:"#f1f5f9",letterSpacing:"0.03em"}}>HAMMADDE TAKİP</div>
            <div style={{fontSize:10,color:"#475569",letterSpacing:"0.06em"}}>VERİ GİRİŞ SİSTEMİ</div>
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          {/* Nav sekmeleri */}
          {["liste","ihtiyac","istatistik"].map(e => {
            const labels = {liste:"📋 Tüm Liste", ihtiyac:"⚠️ İhtiyaç Listesi", istatistik:"📊 İstatistikler"};
            const kritikSay = liste.filter(m=>parseFloat(m.stokMiktari)>0 && parseFloat(m.hesaplananOptimum)>0 && parseFloat(m.stokMiktari)<parseFloat(m.hesaplananOptimum)).length;
            return (
              <button key={e} onClick={()=>setEkran(e)} style={{
                padding:"7px 16px", borderRadius:7, border:"1px solid",
                borderColor: ekran===e ? (e==="ihtiyac"?"#f59e0b":e==="istatistik"?"#10b981":"#3b82f6") : "#1e2430",
                background: ekran===e ? (e==="ihtiyac"?"#2a1f0a":e==="istatistik"?"#0d2018":"#1d3557") : "transparent",
                color: ekran===e ? (e==="ihtiyac"?"#fbbf24":e==="istatistik"?"#34d399":"#60a5fa") : "#64748b",
                cursor:"pointer", fontWeight:700, fontSize:12, display:"flex", alignItems:"center", gap:6
              }}>
                {labels[e]}
                {e==="ihtiyac" && kritikSay>0 && (
                  <span style={{background:"#ef4444",color:"#fff",borderRadius:"50%",width:18,height:18,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700}}>{kritikSay}</span>
                )}
              </button>
            );
          })}
          <div style={{width:1,height:24,background:"#1e2430",margin:"0 4px"}}/>
          <span style={{fontSize:12,color:"#475569"}}>{liste.length} kayıt</span>
          {ekran!=="form" && (
            <button className="btn-primary" onClick={yeniForm}>+ Yeni Hammadde</button>
          )}
          {(ekran==="form"||ekran==="detay") && (
            <button className="btn-secondary" onClick={()=>setEkran("liste")}>← Listeye Dön</button>
          )}
        </div>
      </div>

      <div style={{padding:"24px 28px", maxWidth:1400, margin:"0 auto"}}>

        {/* LİSTE EKRANI */}
        {ekran==="liste" && (
          <div style={{animation:"fadeIn 0.3s"}}>
            <div style={{display:"flex",gap:12,marginBottom:20,flexWrap:"wrap",alignItems:"center"}}>
              <input
                placeholder="🔍  Hammadde, stok kodu veya tür ara..."
                value={arama} onChange={e=>setArama(e.target.value)}
                style={{...{},flex:1,minWidth:220,background:"#141820",border:"1px solid #1e2430",borderRadius:8,padding:"9px 14px",color:"#e2e8f0",fontSize:13,outline:"none"}}
              />
              <div style={{display:"flex",gap:6}}>
                {["Tümü","S","K"].map(v=>(
                  <button key={v} onClick={()=>setFiltreSK(v)} style={{
                    padding:"8px 14px",borderRadius:6,border:"1px solid",fontSize:12,fontWeight:600,cursor:"pointer",
                    borderColor:filtreSK===v?"#3b82f6":"#1e2430",
                    background:filtreSK===v?"#1d3557":"#141820",
                    color:filtreSK===v?"#60a5fa":"#64748b"
                  }}>{v==="Tümü"?"Tümü":v==="S"?"S — Standart":"K — Kapalı"}</button>
                ))}
              </div>
              <select value={filtreTur} onChange={e=>setFiltreTur(e.target.value)}
                style={{background:"#141820",border:"1px solid #1e2430",borderRadius:8,padding:"8px 12px",color:"#94a3b8",fontSize:12,outline:"none"}}>
                <option value="Tümü">Tüm Türler</option>
                {TUR_LISTESI.map(t=><option key={t}>{t}</option>)}
              </select>
            </div>

            {filtreliListe.length === 0 ? (
              <div style={{textAlign:"center",padding:"80px 0",color:"#334155"}}>
                <div style={{fontSize:48,marginBottom:16}}>📦</div>
                <div style={{fontSize:16,marginBottom:8,color:"#475569"}}>Henüz hammadde eklenmedi</div>
                <div style={{fontSize:13,color:"#334155",marginBottom:24}}>Sağ üstteki "Yeni Hammadde" butonuyla başlayın</div>
                <button className="btn-primary" onClick={yeniForm}>+ İlk Hammaddeyi Ekle</button>
              </div>
            ) : (
              <div style={{background:"#141820",border:"1px solid #1e2430",borderRadius:12,overflow:"hidden"}}>
                <div style={{overflowX:"auto"}}>
                <table style={{width:"100%",borderCollapse:"collapse",minWidth:1200}}>
                  <thead>
                    <tr style={{background:"#0d1017",borderBottom:"1px solid #1e2430"}}>
                      {["S/K","Stok Kodu","Ürün Kodu","Tür","Hammadde İsmi / Tedarikçi","Stok Miktarı","Optimum","Termin","2023 Ort.","2024 Ort.","2025 Ort.","Son 12 Ay","Son 3 Ay","İşlem"].map(h=>(
                        <th key={h} style={{padding:"11px 12px",textAlign:"left",fontSize:10,color:"#475569",letterSpacing:"0.07em",fontWeight:700,whiteSpace:"nowrap"}}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {filtreliListe.map(m=>{
                      const ort = (yil) => {
                        const vals = AYLAR.map(a=>parseFloat(m.tuketim[String(yil)]?.[a])).filter(v=>!isNaN(v)&&v>0);
                        return vals.length ? Math.round(vals.reduce((s,v)=>s+v,0)/vals.length) : 0;
                      };
                      const s12 = Math.round(son12AyOrt(m.tuketim));
                      const s3  = Math.round(son3AyOrt(m.tuketim));
                      const stokDusuk = parseFloat(m.stokMiktari) < parseFloat(m.hesaplananOptimum);
                      return (
                        <tr key={m.id} style={{borderBottom:"1px solid #1e2430",cursor:"default"}}
                          onMouseEnter={e=>e.currentTarget.style.background="#1a2130"}
                          onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                          <td style={{padding:"11px 12px"}}>
                            <span style={{padding:"3px 9px",borderRadius:5,fontSize:11,fontWeight:700,background:m.sk==="S"?"#1d3557":"#2d1a1a",color:m.sk==="S"?"#60a5fa":"#f87171",border:`1px solid ${m.sk==="S"?"#3b82f633":"#ef444433"}`}}>{m.sk}</span>
                          </td>
                          <td style={{padding:"11px 12px",color:"#94a3b8",fontSize:12,fontFamily:"monospace"}}>{m.stokKodu}</td>
                          <td style={{padding:"11px 12px",color:"#64748b",fontSize:12,fontFamily:"monospace"}}>{m.urunKodu}</td>
                          <td style={{padding:"11px 12px"}}><span style={{background:"#1e2430",padding:"2px 8px",borderRadius:4,fontSize:11,color:"#94a3b8"}}>{m.tur}</span></td>
                          <td style={{padding:"11px 12px",maxWidth:220}}>
                            <div style={{fontWeight:600,color:"#f1f5f9",fontSize:13}}>{m.hammaddeIsmi}</div>
                            {m.tedarikci && <div style={{fontSize:11,color:"#475569",marginTop:2}}>🏭 {m.tedarikci}</div>}
                          </td>
                          <td style={{padding:"11px 12px",fontWeight:700,fontSize:13,color:stokDusuk?"#f87171":"#34d399"}}>
                            {m.stokMiktari?Number(m.stokMiktari).toLocaleString("tr-TR"):"—"}
                            {stokDusuk && <span style={{fontSize:9,marginLeft:4,background:"#ef444422",color:"#f87171",padding:"1px 5px",borderRadius:3,border:"1px solid #ef444433"}}>↓OPT</span>}
                          </td>
                          <td style={{padding:"11px 12px",color:"#94a3b8",fontSize:12}}>{m.hesaplananOptimum?Number(m.hesaplananOptimum).toLocaleString("tr-TR"):"—"}</td>
                          <td style={{padding:"11px 12px",color:"#64748b",fontSize:12,textAlign:"center"}}>{m.terminSuresi||"—"}</td>
                          <td style={{padding:"11px 12px",color:"#60a5fa",fontSize:12,textAlign:"right",fontFamily:"monospace"}}>{ort(2023).toLocaleString("tr-TR")}</td>
                          <td style={{padding:"11px 12px",color:"#a78bfa",fontSize:12,textAlign:"right",fontFamily:"monospace"}}>{ort(2024).toLocaleString("tr-TR")}</td>
                          <td style={{padding:"11px 12px",color:"#34d399",fontSize:12,textAlign:"right",fontFamily:"monospace"}}>{ort(2025).toLocaleString("tr-TR")}</td>
                          <td style={{padding:"11px 12px",fontSize:12,textAlign:"right",fontFamily:"monospace"}}>
                            <span style={{color:"#fbbf24",fontWeight:600}}>{s12>0?s12.toLocaleString("tr-TR"):"—"}</span>
                          </td>
                          <td style={{padding:"11px 12px",fontSize:12,textAlign:"right",fontFamily:"monospace"}}>
                            <span style={{color:"#fb923c",fontWeight:600}}>{s3>0?s3.toLocaleString("tr-TR"):"—"}</span>
                          </td>
                          <td style={{padding:"11px 12px"}}>
                            <div style={{display:"flex",gap:5}}>
                              <button onClick={()=>detay(m)} title="Detay" style={{background:"#1e2430",border:"none",borderRadius:6,padding:"5px 8px",cursor:"pointer",fontSize:13}}>👁</button>
                              <button onClick={()=>duzenle(m)} title="Düzenle" style={{background:"#1e2430",border:"none",borderRadius:6,padding:"5px 8px",cursor:"pointer",fontSize:13}}>✏️</button>
                              <button onClick={()=>sil(m.id)} className="btn-danger" title="Sil" style={{padding:"5px 8px",fontSize:13}}>🗑️</button>
                            </div>
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
                </div>
              </div>
            )}
          </div>
        )}

        {/* FORM EKRANI */}
        {ekran==="form" && (
          <div>
            <div style={{marginBottom:20}}>
              <h2 style={{fontSize:20,fontWeight:700,color:"#f1f5f9"}}>{duzenleId?"✏️ Hammadde Düzenle":"➕ Yeni Hammadde Ekle"}</h2>
              <p style={{color:"#475569",fontSize:13,marginTop:4}}>Zorunlu alanları (*) doldurun, tüketim verilerini yıl sekmelerinden girin.</p>
            </div>
            <HammaddeForm
              form={form}
              onChange={setForm}
              onKaydet={kaydet}
              onIptal={()=>setEkran("liste")}
              duzenleMode={!!duzenleId}
            />
          </div>
        )}

        {/* İSTATİSTİKLER EKRANI */}
        {ekran==="istatistik" && (()=>{
          const N = (v,d=0) => isNaN(v)||!v ? "—" : Number(v).toLocaleString("tr-TR",{maximumFractionDigits:d});

          // Genel toplamlar
          const toplamStok = liste.reduce((s,m)=>s+(parseFloat(m.stokMiktari)||0),0);
          const ihtiyacSay = liste.filter(m=>parseFloat(m.stokMiktari)<parseFloat(m.hesaplananOptimum)&&parseFloat(m.hesaplananOptimum)>0).length;

          // Yıllara göre toplam tüketim
          const yilToplam = {};
          YILLAR.forEach(y=>{
            yilToplam[y] = liste.reduce((s,m)=>{
              const vals = AYLAR.map(a=>parseFloat(m.tuketim[String(y)]?.[a])||0);
              return s + vals.reduce((a,b)=>a+b,0);
            },0);
          });
          const yilOrtToplamlar = {};
          YILLAR.forEach(y=>{
            const ayBas = liste.reduce((s,m)=>{
              const vals = AYLAR.map(a=>parseFloat(m.tuketim[String(y)]?.[a])).filter(v=>!isNaN(v)&&v>0);
              return s+(vals.length?vals.reduce((a,b)=>a+b,0)/vals.length:0);
            },0);
            yilOrtToplamlar[y] = ayBas;
          });

          // Tür bazlı istatistik
          const turler = [...new Set(liste.map(m=>m.tur).filter(Boolean))];
          const turStats = turler.map(tur=>{
            const malz = liste.filter(m=>m.tur===tur);
            const ort2025 = malz.reduce((s,m)=>s+hesaplaOrt(m.tuketim,2025),0);
            const ort2024 = malz.reduce((s,m)=>s+hesaplaOrt(m.tuketim,2024),0);
            const s12 = malz.reduce((s,m)=>s+son12AyOrt(m.tuketim),0);
            return {tur, sayi:malz.length, ort2025, ort2024, s12};
          }).sort((a,b)=>b.ort2025-a.ort2025);

          // Her hammadde için yıllık istatistik
          const hammaddeStats = liste.map(m=>{
            const o23=hesaplaOrt(m.tuketim,2023), o24=hesaplaOrt(m.tuketim,2024), o25=hesaplaOrt(m.tuketim,2025);
            const s12=son12AyOrt(m.tuketim), s3=son3AyOrt(m.tuketim);
            const trend = o24>0 ? ((o25-o24)/o24*100) : null;
            return {...m, o23,o24,o25,s12,s3,trend};
          }).sort((a,b)=>b.o25-a.o25);

          const maxO25 = Math.max(...hammaddeStats.map(m=>m.o25));

          return (
            <div style={{animation:"fadeIn 0.3s"}}>
              <div style={{marginBottom:20}}>
                <h2 style={{fontSize:22,fontWeight:700,color:"#f1f5f9",marginBottom:4}}>📊 İstatistikler</h2>
                <p style={{color:"#475569",fontSize:13}}>Yıllara ve hammaddelere göre tüketim analizleri</p>
              </div>

              {/* Genel özet kartlar */}
              <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:14,marginBottom:24}}>
                {[
                  {label:"Toplam Hammadde",val:liste.length+" kalem",renk:"#3b82f6",bg:"#1d3557",icon:"📦"},
                  {label:"Toplam Stok",val:N(toplamStok)+" kg",renk:"#10b981",bg:"#0d2018",icon:"🏭"},
                  {label:"İhtiyaç Durumunda",val:ihtiyacSay+" kalem",renk:"#f59e0b",bg:"#2a1f0a",icon:"⚠️"},
                  {label:"2025 Aylık Ort. Toplam",val:N(yilOrtToplamlar[2025]),renk:"#8b5cf6",bg:"#1e1535",icon:"📈"},
                ].map((k,i)=>(
                  <div key={i} style={{background:k.bg,border:`1px solid ${k.renk}44`,borderRadius:12,padding:18,borderTop:`3px solid ${k.renk}`}}>
                    <div style={{fontSize:22,marginBottom:8}}>{k.icon}</div>
                    <div style={{fontSize:20,fontWeight:700,color:k.renk}}>{k.val}</div>
                    <div style={{fontSize:11,color:"#64748b",marginTop:4}}>{k.label}</div>
                  </div>
                ))}
              </div>

              {/* Yıllara göre toplam tüketim */}
              <div style={{background:"#141820",border:"1px solid #1e2430",borderRadius:12,padding:20,marginBottom:20}}>
                <div style={{fontSize:12,fontWeight:700,letterSpacing:"0.1em",color:"#64748b",marginBottom:16,textTransform:"uppercase"}}>Yıllara Göre Toplam Tüketim</div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:16}}>
                  {YILLAR.map(y=>{
                    const renk = YIL_RENKLER[y];
                    const maxYil = Math.max(...YILLAR.map(yy=>yilToplam[yy]||0));
                    const yuzde = maxYil>0?Math.round((yilToplam[y]||0)/maxYil*100):0;
                    return (
                      <div key={y} style={{background:"#0f1117",borderRadius:10,padding:16,border:`1px solid ${renk.border}33`}}>
                        <div style={{fontSize:13,fontWeight:700,color:renk.text,marginBottom:12}}>{y}</div>
                        <div style={{fontSize:22,fontWeight:700,color:"#f1f5f9",marginBottom:4}}>{N(yilToplam[y])}</div>
                        <div style={{fontSize:11,color:"#475569",marginBottom:10}}>Aylık ort: {N(yilOrtToplamlar[y])}</div>
                        <div style={{height:6,background:"#1e2430",borderRadius:3}}>
                          <div style={{width:`${yuzde}%`,height:"100%",background:renk.border,borderRadius:3,transition:"width 0.6s"}}/>
                        </div>
                        <div style={{fontSize:10,color:"#475569",marginTop:4}}>%{yuzde} (max'a göre)</div>
                      </div>
                    );
                  })}
                </div>
              </div>

              {/* Tür bazlı istatistik */}
              <div style={{background:"#141820",border:"1px solid #1e2430",borderRadius:12,padding:20,marginBottom:20}}>
                <div style={{fontSize:12,fontWeight:700,letterSpacing:"0.1em",color:"#64748b",marginBottom:16,textTransform:"uppercase"}}>Tür Bazlı Aylık Ortalama Tüketim</div>
                <div style={{overflowX:"auto"}}>
                  <table style={{width:"100%",borderCollapse:"collapse"}}>
                    <thead>
                      <tr style={{borderBottom:"1px solid #1e2430"}}>
                        {["Tür","Kalem","2024 Ort./Ay","2025 Ort./Ay","Son 12 Ay Ort.","Trend"].map(h=>(
                          <th key={h} style={{padding:"9px 14px",textAlign:"left",fontSize:10,color:"#475569",letterSpacing:"0.07em",fontWeight:700}}>{h}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {turStats.map(t=>{
                        const trend = t.ort2024>0?((t.ort2025-t.ort2024)/t.ort2024*100):null;
                        return (
                          <tr key={t.tur} style={{borderBottom:"1px solid #1e2430"}}
                            onMouseEnter={e=>e.currentTarget.style.background="#1a2130"}
                            onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                            <td style={{padding:"11px 14px"}}><span style={{background:"#1e2430",padding:"3px 10px",borderRadius:4,fontSize:12,color:"#94a3b8",fontWeight:700}}>{t.tur}</span></td>
                            <td style={{padding:"11px 14px",color:"#64748b",fontSize:12}}>{t.sayi}</td>
                            <td style={{padding:"11px 14px",color:"#a78bfa",fontSize:13,fontFamily:"monospace",fontWeight:600}}>{N(t.ort2024)}</td>
                            <td style={{padding:"11px 14px",color:"#34d399",fontSize:13,fontFamily:"monospace",fontWeight:600}}>{N(t.ort2025)}</td>
                            <td style={{padding:"11px 14px",color:"#fbbf24",fontSize:13,fontFamily:"monospace",fontWeight:600}}>{N(t.s12)}</td>
                            <td style={{padding:"11px 14px"}}>
                              {trend!==null && (
                                <span style={{color:trend>0?"#34d399":"#f87171",fontWeight:700,fontSize:12}}>
                                  {trend>0?"▲":"▼"} %{Math.abs(trend).toFixed(1)}
                                </span>
                              )}
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              </div>

              {/* Her hammadde için yıllık istatistik */}
              <div style={{background:"#141820",border:"1px solid #1e2430",borderRadius:12,padding:20}}>
                <div style={{fontSize:12,fontWeight:700,letterSpacing:"0.1em",color:"#64748b",marginBottom:16,textTransform:"uppercase"}}>Hammadde Bazlı Tüketim İstatistikleri (2025 tüketimine göre sıralı)</div>
                <div style={{overflowX:"auto"}}>
                  <table style={{width:"100%",borderCollapse:"collapse",minWidth:900}}>
                    <thead>
                      <tr style={{borderBottom:"2px solid #1e2430",background:"#0d1017"}}>
                        {["Hammadde","Tür","2023 Ort.","2024 Ort.","2025 Ort.","Son 12 Ay","Son 3 Ay","2025 Trend","Gösterge"].map(h=>(
                          <th key={h} style={{padding:"10px 12px",textAlign:"left",fontSize:10,color:"#475569",letterSpacing:"0.07em",fontWeight:700,whiteSpace:"nowrap"}}>{h}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {hammaddeStats.map(m=>{
                        const trendRenk = m.trend===null?"#64748b":m.trend>10?"#34d399":m.trend<-10?"#f87171":"#fbbf24";
                        const barYuzde = maxO25>0?Math.round(m.o25/maxO25*100):0;
                        return (
                          <tr key={m.id} style={{borderBottom:"1px solid #1e2430"}}
                            onMouseEnter={e=>e.currentTarget.style.background="#1a2130"}
                            onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                            <td style={{padding:"10px 12px",maxWidth:200}}>
                              <div style={{fontWeight:600,color:"#f1f5f9",fontSize:12}}>{m.hammaddeIsmi}</div>
                              {m.tedarikci&&<div style={{fontSize:10,color:"#475569"}}>🏭 {m.tedarikci}</div>}
                            </td>
                            <td style={{padding:"10px 12px"}}><span style={{background:"#1e2430",padding:"2px 7px",borderRadius:3,fontSize:10,color:"#94a3b8"}}>{m.tur}</span></td>
                            <td style={{padding:"10px 12px",color:"#60a5fa",fontSize:12,fontFamily:"monospace",textAlign:"right"}}>{N(m.o23)}</td>
                            <td style={{padding:"10px 12px",color:"#a78bfa",fontSize:12,fontFamily:"monospace",textAlign:"right"}}>{N(m.o24)}</td>
                            <td style={{padding:"10px 12px",color:"#34d399",fontSize:12,fontFamily:"monospace",textAlign:"right",fontWeight:700}}>{N(m.o25)}</td>
                            <td style={{padding:"10px 12px",color:"#fbbf24",fontSize:12,fontFamily:"monospace",textAlign:"right"}}>{m.s12>0?N(m.s12):"—"}</td>
                            <td style={{padding:"10px 12px",color:"#fb923c",fontSize:12,fontFamily:"monospace",textAlign:"right"}}>{m.s3>0?N(m.s3):"—"}</td>
                            <td style={{padding:"10px 12px"}}>
                              {m.trend!==null?(
                                <span style={{color:trendRenk,fontWeight:700,fontSize:11}}>
                                  {m.trend>0?"▲":"▼"} %{Math.abs(m.trend).toFixed(1)}
                                </span>
                              ):<span style={{color:"#334155"}}>—</span>}
                            </td>
                            <td style={{padding:"10px 12px",minWidth:100}}>
                              <div style={{height:6,background:"#1e2430",borderRadius:3}}>
                                <div style={{width:`${barYuzde}%`,height:"100%",background:"linear-gradient(90deg,#3b82f6,#8b5cf6)",borderRadius:3}}/>
                              </div>
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          );
        })()}

        {/* İHTİYAÇ LİSTESİ EKRANI */}
        {ekran==="ihtiyac" && (()=>{
          const ihtiyacListe = liste
            .filter(m => {
              const stok = parseFloat(m.stokMiktari);
              const opt = parseFloat(m.hesaplananOptimum);
              return !isNaN(stok) && !isNaN(opt) && opt > 0 && stok < opt;
            })
            .map(m => {
              const stok = parseFloat(m.stokMiktari);
              const opt = parseFloat(m.hesaplananOptimum);
              const eksik = opt - stok;
              const oran = stok / opt;
              // Son 12 ay ort hesapla (2025 + 2026 mevcut aylar)
              const t2025 = Object.values(m.tuketim["2025"]).map(v=>parseFloat(v)).filter(v=>!isNaN(v)&&v>0);
              const t2026 = Object.values(m.tuketim["2026"]).map(v=>parseFloat(v)).filter(v=>!isNaN(v)&&v>0);
              const tumTuk = [...t2025, ...t2026];
              const aylikOrt = tumTuk.length ? tumTuk.reduce((s,v)=>s+v,0)/tumTuk.length : 0;
              const kalanGun = aylikOrt > 0 ? Math.round(stok / (aylikOrt / 30)) : null;
              return { ...m, stok, opt, eksik, oran, aylikOrt, kalanGun };
            })
            .sort((a,b) => a.oran - b.oran); // en kritik önce

          const acil = ihtiyacListe.filter(m=>m.oran < 0.25);
          const orta = ihtiyacListe.filter(m=>m.oran >= 0.25 && m.oran < 0.75);
          const dusuk = ihtiyacListe.filter(m=>m.oran >= 0.75);

          return (
            <div style={{animation:"fadeIn 0.3s"}}>
              <div style={{marginBottom:20}}>
                <h2 style={{fontSize:22,fontWeight:700,color:"#f1f5f9",marginBottom:4}}>⚠️ İhtiyaç Listesi</h2>
                <p style={{color:"#475569",fontSize:13}}>Stok miktarı hesaplanan optimumun altında kalan hammaddeler</p>
              </div>

              {/* Özet kartlar */}
              <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:14,marginBottom:24}}>
                {[
                  {label:"Toplam İhtiyaç",val:ihtiyacListe.length+" kalem",renk:"#f59e0b",bg:"#2a1f0a",icon:"📦"},
                  {label:"Acil (<%25)",val:acil.length+" kalem",renk:"#ef4444",bg:"#2d1a1a",icon:"🚨"},
                  {label:"Orta (%25–75)",val:orta.length+" kalem",renk:"#f97316",bg:"#2a1a0a",icon:"⚠️"},
                  {label:"Düşük (>%75)",val:dusuk.length+" kalem",renk:"#eab308",bg:"#1f1e0a",icon:"📉"},
                ].map((k,i)=>(
                  <div key={i} style={{background:k.bg,border:`1px solid ${k.renk}44`,borderRadius:12,padding:18,borderTop:`3px solid ${k.renk}`}}>
                    <div style={{fontSize:22,marginBottom:8}}>{k.icon}</div>
                    <div style={{fontSize:22,fontWeight:700,color:k.renk}}>{k.val}</div>
                    <div style={{fontSize:11,color:"#64748b",marginTop:4}}>{k.label}</div>
                  </div>
                ))}
              </div>

              {ihtiyacListe.length === 0 ? (
                <div style={{textAlign:"center",padding:60,color:"#334155"}}>
                  <div style={{fontSize:48,marginBottom:12}}>✅</div>
                  <div style={{fontSize:16,color:"#475569"}}>Tüm hammaddeler yeterli stok seviyesinde!</div>
                </div>
              ) : (
                <div style={{background:"#141820",border:"1px solid #1e2430",borderRadius:12,overflow:"hidden"}}>
                  <table style={{width:"100%",borderCollapse:"collapse"}}>
                    <thead>
                      <tr style={{background:"#0d1017",borderBottom:"2px solid #1e2430"}}>
                        {["Öncelik","S/K","Stok Kodu","Hammadde İsmi","Tür","Mevcut Stok","Optimum","Eksik Miktar","Doluluk","Aylık Ort. Tük.","Tahmini Tükenme","Termin","İşlem"].map(h=>(
                          <th key={h} style={{padding:"11px 13px",textAlign:"left",fontSize:10,color:"#475569",letterSpacing:"0.07em",fontWeight:700,whiteSpace:"nowrap"}}>{h}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {ihtiyacListe.map((m,idx)=>{
                        const oncelik = m.oran < 0.25
                          ? {renk:"#ef4444",bg:"#2d1a1a",etiket:"ACİL",icon:"🚨"}
                          : m.oran < 0.75
                          ? {renk:"#f97316",bg:"#2a1a0a",etiket:"ORTA",icon:"⚠️"}
                          : {renk:"#eab308",bg:"#1f1e0a",etiket:"DÜŞÜK",icon:"📉"};
                        const yuzde = Math.round(m.oran * 100);
                        const kalanText = m.kalanGun !== null
                          ? m.kalanGun <= 0 ? "Tükendi!"
                          : m.kalanGun < 30 ? `${m.kalanGun} gün`
                          : `~${Math.round(m.kalanGun/30)} ay`
                          : "—";
                        const kalanRenk = m.kalanGun !== null
                          ? m.kalanGun <= 7 ? "#ef4444"
                          : m.kalanGun <= 30 ? "#f97316"
                          : m.kalanGun <= 90 ? "#eab308"
                          : "#94a3b8"
                          : "#64748b";
                        return (
                          <tr key={m.id} style={{borderBottom:"1px solid #1e2430"}}
                            onMouseEnter={e=>e.currentTarget.style.background="#1a2130"}
                            onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                            <td style={{padding:"12px 13px"}}>
                              <span style={{background:oncelik.bg,color:oncelik.renk,padding:"3px 9px",borderRadius:5,fontSize:11,fontWeight:700,border:`1px solid ${oncelik.renk}44`,whiteSpace:"nowrap"}}>
                                {oncelik.icon} {oncelik.etiket}
                              </span>
                            </td>
                            <td style={{padding:"12px 13px"}}>
                              <span style={{padding:"2px 8px",borderRadius:4,fontSize:11,fontWeight:700,background:m.sk==="S"?"#1d3557":"#2d1a1a",color:m.sk==="S"?"#60a5fa":"#f87171"}}>{m.sk}</span>
                            </td>
                            <td style={{padding:"12px 13px",color:"#94a3b8",fontSize:12,fontFamily:"monospace"}}>{m.stokKodu}</td>
                            <td style={{padding:"12px 13px",fontWeight:600,color:"#f1f5f9",fontSize:13,maxWidth:220}}>{m.hammaddeIsmi}</td>
                            <td style={{padding:"12px 13px"}}><span style={{background:"#1e2430",padding:"2px 8px",borderRadius:4,fontSize:11,color:"#94a3b8"}}>{m.tur}</span></td>
                            <td style={{padding:"12px 13px",fontWeight:700,color:"#f87171",fontSize:13}}>{m.stok.toLocaleString("tr-TR")}</td>
                            <td style={{padding:"12px 13px",color:"#64748b",fontSize:12}}>{m.opt.toLocaleString("tr-TR")}</td>
                            <td style={{padding:"12px 13px",fontWeight:700,color:oncelik.renk,fontSize:13}}>{m.eksik.toLocaleString("tr-TR")}</td>
                            <td style={{padding:"12px 13px",minWidth:120}}>
                              <div style={{marginBottom:4,display:"flex",justifyContent:"space-between"}}>
                                <span style={{fontSize:11,color:oncelik.renk,fontWeight:700}}>%{yuzde}</span>
                              </div>
                              <div style={{height:8,background:"#1e2430",borderRadius:4,overflow:"hidden"}}>
                                <div style={{
                                  width:`${yuzde}%`,height:"100%",borderRadius:4,
                                  background: m.oran<0.25?"linear-gradient(90deg,#ef4444,#f97316)"
                                    : m.oran<0.75?"linear-gradient(90deg,#f97316,#eab308)"
                                    : "linear-gradient(90deg,#eab308,#84cc16)",
                                  transition:"width 0.5s"
                                }}/>
                              </div>
                            </td>
                            <td style={{padding:"12px 13px",color:"#94a3b8",fontSize:12}}>{m.aylikOrt>0?Math.round(m.aylikOrt).toLocaleString("tr-TR"):"—"}</td>
                            <td style={{padding:"12px 13px",fontWeight:700,color:kalanRenk,fontSize:13,whiteSpace:"nowrap"}}>{kalanText}</td>
                            <td style={{padding:"12px 13px",color:"#64748b",fontSize:12}}>{m.terminSuresi?m.terminSuresi+" gün":"—"}</td>
                            <td style={{padding:"12px 13px"}}>
                              <div style={{display:"flex",gap:6}}>
                                <button onClick={()=>detay(m)} title="Detay" style={{background:"#1e2430",border:"none",borderRadius:6,padding:"5px 9px",cursor:"pointer",fontSize:13}}>👁</button>
                                <button onClick={()=>duzenle(m)} title="Düzenle" style={{background:"#1e2430",border:"none",borderRadius:6,padding:"5px 9px",cursor:"pointer",fontSize:13}}>✏️</button>
                              </div>
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              )}
            </div>
          );
        })()}

        {/* DETAY EKRANI */}
        {ekran==="detay" && detayM && (
          <div style={{animation:"fadeIn 0.3s"}}>
            <div style={{marginBottom:20,display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
              <div>
                <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:4}}>
                  <span style={{padding:"3px 10px",borderRadius:5,fontSize:12,fontWeight:700,background:detayM.sk==="S"?"#1d3557":"#2d1a1a",color:detayM.sk==="S"?"#60a5fa":"#f87171"}}>{detayM.sk === "S" ? "S — Standart" : "K — Kapalı"}</span>
                  <span style={{background:"#1e2430",padding:"3px 10px",borderRadius:4,fontSize:12,color:"#94a3b8"}}>{detayM.tur}</span>
                </div>
                <h2 style={{fontSize:22,fontWeight:700,color:"#f1f5f9"}}>{detayM.hammaddeIsmi}</h2>
                <p style={{color:"#475569",fontSize:13,marginTop:2}}>Stok: {detayM.stokKodu} · Ürün: {detayM.urunKodu}</p>
              </div>
              <button className="btn-primary" onClick={()=>duzenle(detayM)}>✏️ Düzenle</button>
            </div>

            {/* Özet kartlar */}
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:14,marginBottom:16}}>
              {[
                {label:"Stok Miktarı",val:detayM.stokMiktari?Number(detayM.stokMiktari).toLocaleString("tr-TR")+" kg":"—",renk:"#34d399"},
                {label:"Hesaplanan Optimum",val:detayM.hesaplananOptimum?Number(detayM.hesaplananOptimum).toLocaleString("tr-TR"):"—",renk:"#60a5fa"},
                {label:"Termin Süresi",val:detayM.terminSuresi?detayM.terminSuresi+" gün":"—",renk:"#fbbf24"},
              ].map((k,i)=>(
                <div key={i} className="card">
                  <div style={{fontSize:11,color:"#475569",marginBottom:6,letterSpacing:"0.06em",textTransform:"uppercase"}}>{k.label}</div>
                  <div style={{fontSize:22,fontWeight:700,color:k.renk}}>{k.val}</div>
                </div>
              ))}
            </div>

            {/* Tüketim tablosu */}
            <div className="card">
              <div className="section-title">📅 Tüketim Verileri</div>
              <div style={{overflowX:"auto"}}>
                <table style={{width:"100%",borderCollapse:"collapse",minWidth:700}}>
                  <thead>
                    <tr style={{borderBottom:"1px solid #1e2430"}}>
                      <th style={{padding:"8px 12px",textAlign:"left",fontSize:11,color:"#475569",fontWeight:700}}>YIL</th>
                      {AYLAR.map(a=><th key={a} style={{padding:"8px 10px",textAlign:"right",fontSize:11,color:"#475569",fontWeight:700}}>{a.slice(0,3)}</th>)}
                      <th style={{padding:"8px 12px",textAlign:"right",fontSize:11,color:"#475569",fontWeight:700}}>ORT.</th>
                    </tr>
                  </thead>
                  <tbody>
                    {YILLAR.map(y=>{
                      const renk = YIL_RENKLER[y];
                      const vals = AYLAR.map(a=>parseFloat(detayM.tuketim[y][a])).filter(v=>!isNaN(v)&&v>0);
                      const ort = vals.length?(vals.reduce((s,v)=>s+v,0)/vals.length).toFixed(0):"—";
                      return (
                        <tr key={y} style={{borderBottom:"1px solid #1e2430"}}>
                          <td style={{padding:"10px 12px"}}>
                            <span style={{fontWeight:700,color:renk.text,fontSize:13}}>{y}</span>
                          </td>
                          {AYLAR.map(a=>{
                            const v = detayM.tuketim[y][a];
                            return <td key={a} style={{padding:"10px 10px",textAlign:"right",fontSize:12,color:v?renk.text:"#2d3748",fontFamily:"monospace"}}>{v?Number(v).toLocaleString("tr-TR"):"—"}</td>;
                          })}
                          <td style={{padding:"10px 12px",textAlign:"right",fontWeight:700,color:renk.text,fontSize:12}}>{ort!=="—"?Number(ort).toLocaleString("tr-TR"):ort}</td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
